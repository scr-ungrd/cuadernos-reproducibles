        - title: "CRC-002: Calor Urbano Cartagena"
          file: crc002/article.ipynb
          children:
            - file: crc002/notebooks/observable-exports.ipynb
        - title: "CRC-003: Tsunami de Tumaco 1979"
          file: crc003/article.md
          children:
            - file: crc003/notebooks/01-bathymetry.ipynb
            - file: crc003/notebooks/02-simulation.ipynb
            - file: crc003/notebooks/03-visualization.ipynb
        - title: "CRC-004: Sismicidad de Colombia"
          file: crc004/sismicidad-colombia.ipynb
        - title: "CRC-005: Inundaciones Sentinel-1 (GEE)"
          file: crc005/gee-inundaciones-sentinel1.ipynb

